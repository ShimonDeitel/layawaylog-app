name: Layaway
options:
  bundleIdPrefix: com.shimondeitel.layawaylog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Layaway:
    type: application
    platform: iOS
    sources:
      - path: Layaway
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.layawaylog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Layaway/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LayawayTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LayawayTests
      - path: Layaway.storekit
    dependencies:
      - target: Layaway
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.layawaylog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LayawayUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LayawayUITests
    dependencies:
      - target: Layaway
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.layawaylog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Layaway:
    build:
      targets:
        Layaway: all
        LayawayTests: [test]
        LayawayUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Layaway.storekit
    test:
      config: Debug
      storeKitConfiguration: Layaway.storekit
      targets:
        - LayawayTests
        - LayawayUITests
    archive:
      config: Release
